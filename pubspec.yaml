name: dm_tool
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  #network
  retrofit: ^3.3.1
  dio: ^4.0.6
  logger: ^1.1.0

  #env
  flutter_config: ^2.0.0

  #bloc
  flutter_bloc: ^8.1.1
  equatable: ^2.0.5

  #gen-lib
  freezed: ^2.3.2
  freezed_annotation: ^2.2.0
  json_serializable: ^6.5.4
  flutter_svg: ^1.1.6
  flutter_gen: ^5.1.0+1

  #dependency injection
  get_it: ^7.2.0
  injectable: ^2.1.0

  #routes
  auto_route: ^5.0.4

  #responsive
  flutter_screenutil: ^5.6.0

  #plugin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.3.3
  flutter_gen_runner: ^5.1.0+1
  injectable_generator: ^2.1.3
  auto_route_generator: ^5.0.3

flutter_gen:
  output: lib/gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)
  integrations:
    flutter_svg: true

flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/
    - assets/images/
    - assets/jsons/
    - assets/fonts/

# To modify fonts, uncomment rows below.
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 600
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Thin.ttf
          weight: 300
